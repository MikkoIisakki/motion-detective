# Clean received with low elbows — the rack never comes through (elbow ~90
# deg, clean_and_jerk.catch.elbow_angle FAULT [65, 180]). Squat depth is good
# (knee 80 in [60, 100], hip 70 in [55, 90]) so only the elbow rule fires.
clip:
  name: cnj_catch_low_elbows
  lift: clean_and_jerk
  fps: 30
  width: 640
  height: 480

frames:
  - count: 5
    pose:
      knee_angle: 90       # setup: good
      hip_angle: 55
      elbow_angle: 180
      wrist_y_offset: 0
  - count: 5
    pose:
      knee_angle: 120      # first_pull: good
      hip_angle: 90
      elbow_angle: 180
      wrist_y_offset: -50
  - count: 5
    pose:
      knee_angle: 170      # second_pull: good
      hip_angle: 170
      elbow_angle: 180
      wrist_y_offset: -260
  # CATCH: deep front squat but the elbows hang at 90 deg instead of racking
  # up (good rack is [0, 45]). Wrist just above shoulder height -> CATCH.
  - count: 15
    pose:
      knee_angle: 80
      hip_angle: 70
      elbow_angle: 90      # catch.elbow_angle FAULT [65, 180]
      wrist_y_offset: -201

expected:
  - phase: catch
    severity: FAULT
    priority: safety
    feedback_substring: "Drive the elbows up and through"
