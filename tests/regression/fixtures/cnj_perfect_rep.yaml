# Clean & jerk executed cleanly through every phase, including the jerk dip
# and jerk catch — must produce zero actionable findings. Acts as the negative
# case for the jerk-phase regression coverage.
clip:
  name: cnj_perfect_rep
  lift: clean_and_jerk
  fps: 30
  width: 640
  height: 480

frames:
  - count: 5
    pose:
      knee_angle: 90       # setup.knee_angle good [70, 100]
      hip_angle: 55        # setup.hip_angle good [45, 65]
      elbow_angle: 180
      wrist_y_offset: 0
  - count: 5
    pose:
      knee_angle: 120      # first_pull.knee_angle good [100, 150]
      hip_angle: 90        # first_pull.hip_angle good [70, 110]
      elbow_angle: 180
      wrist_y_offset: -50
  - count: 5
    pose:
      knee_angle: 170      # second_pull: hip good [160, 180]
      hip_angle: 170
      elbow_angle: 180     # second_pull.elbow_angle good [165, 180]
      wrist_y_offset: -260
  # Clean catch: front-rack (elbow ~30 deg, good [0, 45]) in a deep front
  # squat. Wrist just above shoulder height so the detector latches CATCH.
  - count: 5
    pose:
      knee_angle: 80       # catch.knee_angle good [60, 100]
      hip_angle: 70        # catch.hip_angle good [55, 90]
      elbow_angle: 30
      wrist_y_offset: -201
  # Clean recovery: standing tall, bar still racked (wrist ~20 px above the
  # shoulders — inside the racked band).
  - count: 5
    pose:
      knee_angle: 170      # recovery.knee_angle good [165, 180]
      hip_angle: 170       # recovery.hip_angle good [160, 180]
      elbow_angle: 30
      wrist_y_offset: -318
  # Jerk dip: knees re-bend (hips descend ~8 px) while the torso stays
  # vertical and the bar stays racked.
  - count: 5
    pose:
      knee_angle: 155      # jerk_dip.knee_angle good [145, 165]
      hip_angle: 170       # jerk_dip.hip_angle good [155, 180]
      elbow_angle: 30
      wrist_y_offset: -307
  # Jerk catch: bar overhead with locked elbows in a split/power receiving
  # position (wrist well above the shoulders).
  - count: 5
    pose:
      knee_angle: 120      # jerk_catch.knee_angle good [100, 140]
      hip_angle: 140
      elbow_angle: 180     # jerk_catch.elbow_angle good [170, 180]
      wrist_y_offset: -344
  # Final recovery: standing tall, bar overhead.
  - count: 10
    pose:
      knee_angle: 170      # recovery.knee_angle good [165, 180]
      hip_angle: 170       # recovery.hip_angle good [160, 180]
      elbow_angle: 180
      wrist_y_offset: -344

expected: []
