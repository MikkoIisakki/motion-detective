# Snatch catch received too high — hips and knees above parallel
# (catch.hip_angle FAULT [110, 180], catch.knee_angle FAULT [115, 180]).
# Elbows fully locked out so no elbow fault.
clip:
  name: snatch_catch_high
  lift: snatch
  fps: 30
  width: 640
  height: 480

frames:
  - count: 5
    pose:
      knee_angle: 90
      hip_angle: 50
      elbow_angle: 180
      wrist_y_offset: 0
  - count: 5
    pose:
      knee_angle: 120
      hip_angle: 80
      elbow_angle: 180
      wrist_y_offset: -50
  - count: 5
    pose:
      knee_angle: 170
      hip_angle: 170
      elbow_angle: 180
      wrist_y_offset: -260
  # CATCH: knee 140, hip 140 → both in FAULT bands. Wrist above shoulder so the
  # phase detector latches CATCH. Elbow 180 → catch.elbow_angle GOOD [170, 180].
  - count: 20
    pose:
      knee_angle: 140
      hip_angle: 140
      elbow_angle: 180
      wrist_y_offset: -290

expected:
  - phase: catch
    severity: FAULT
    priority: performance
    feedback_substring: "Catch below parallel"
  - phase: catch
    severity: FAULT
    priority: performance
    feedback_substring: "Drop lower in the catch"
