# Snatch second pull with an early arm bend — the elbows break to ~100 deg
# while the legs finish (snatch.second_pull.elbow_angle FAULT [0, 145]).
# Hip and knee extension are complete (both good) so only the elbow fires.
clip:
  name: snatch_second_pull_early_arm_bend
  lift: snatch
  fps: 30
  width: 640
  height: 480

frames:
  - count: 5
    pose:
      knee_angle: 90       # setup: good
      hip_angle: 50
      elbow_angle: 180
      wrist_y_offset: 0
  - count: 5
    pose:
      knee_angle: 120      # first_pull: good
      hip_angle: 80
      elbow_angle: 180
      wrist_y_offset: -50
  # SECOND_PULL: full hip + knee extension but the elbows bend early.
  - count: 20
    pose:
      knee_angle: 170      # second_pull.knee_angle good [155, 180]
      hip_angle: 170       # second_pull.hip_angle good [160, 180]
      elbow_angle: 100     # second_pull.elbow_angle FAULT [0, 145]
      wrist_y_offset: -260

expected:
  - phase: second_pull
    severity: FAULT
    priority: performance
    feedback_substring: "pulling early wastes the drive"
