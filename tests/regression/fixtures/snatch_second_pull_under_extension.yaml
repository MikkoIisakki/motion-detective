# Snatch second pull with incomplete hip + knee extension — both second_pull
# joint rules fault. Elbow stays straight (good) so only those two faults fire.
clip:
  name: snatch_second_pull_under_extension
  lift: snatch
  fps: 30
  width: 640
  height: 480

frames:
  - count: 5
    pose:
      knee_angle: 90
      hip_angle: 50
      elbow_angle: 180
      wrist_y_offset: 0
  - count: 5
    pose:
      knee_angle: 120
      hip_angle: 80
      elbow_angle: 180
      wrist_y_offset: -50
  # SECOND_PULL: knee ~130 deg (good would be 155-180), hip ~130 deg (good 160-180).
  # Both in FAULT band [0, 140]. Elbow 180 stays GOOD [165, 180].
  - count: 20
    pose:
      knee_angle: 130
      hip_angle: 130
      elbow_angle: 180
      wrist_y_offset: -230

expected:
  - phase: second_pull
    severity: FAULT
    priority: performance
    feedback_substring: "Drive hips through fully"
  - phase: second_pull
    severity: FAULT
    priority: efficiency
    feedback_substring: "Extend the knees fully"
