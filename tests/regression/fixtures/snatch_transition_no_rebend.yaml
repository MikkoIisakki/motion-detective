# Snatch transition (bar between knee and hip) with no double knee bend — the
# knees stay near-straight (~160, snatch.transition.knee_angle FAULT
# [140, 180]) instead of re-bending under the bar. Arms stay long (elbow 170,
# good [165, 180]) so only the knee rule fires. The wrist holds between knee
# height and the second-pull band so the detector latches TRANSITION.
clip:
  name: snatch_transition_no_rebend
  lift: snatch
  fps: 30
  width: 640
  height: 480

frames:
  - count: 5
    pose:
      knee_angle: 90       # setup: good
      hip_angle: 50
      elbow_angle: 180
      wrist_y_offset: 0
  - count: 5
    pose:
      knee_angle: 120      # first_pull: good
      hip_angle: 80
      elbow_angle: 180
      wrist_y_offset: -50
  # TRANSITION: wrist above knee height (y=300) but well below the
  # second-pull band (shoulder_y + 50 ~= 159 for this pose) -> TRANSITION.
  # No hip rule exists for the transition phase.
  - count: 20
    pose:
      knee_angle: 160      # transition.knee_angle FAULT [140, 180]
      hip_angle: 145
      elbow_angle: 170     # transition.elbow_angle good [165, 180]
      wrist_y_offset: -130

expected:
  - phase: transition
    severity: FAULT
    priority: performance
    feedback_substring: "initiate the double knee bend"
